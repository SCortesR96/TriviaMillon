{% load static %}<!doctype html>
<html lang="es" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TriviaMillon{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'dist/output.css' %}">
  <script src="{% static 'vendor/alpine.min.js' %}" defer></script>
  {% block extra_head %}{% endblock %}
</head>
<body class="h-full text-slate-100 animated-gradient-bg relative overflow-x-hidden">
  <div class="pointer-events-none fixed inset-0 overflow-hidden -z-10" aria-hidden="true">
    <div class="blob absolute -top-32 -left-24 h-96 w-96 rounded-full bg-amber-500/20 blur-3xl"></div>
    <div class="blob blob-delay-1 absolute top-1/3 -right-32 h-112 w-md rounded-full bg-indigo-500/25 blur-3xl"></div>
    <div class="blob blob-delay-2 absolute -bottom-24 left-1/4 h-96 w-96 rounded-full bg-emerald-500/15 blur-3xl"></div>
  </div>
  {% block content %}{% endblock %}
</body>
</html>
