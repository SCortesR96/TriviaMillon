services:
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file: .env
    volumes:
      - .:/app
      # Alpine.js se resuelve una sola vez via npm en el build (Dockerfile); este volumen
      # nombrado se monta sobre esa subcarpeta para que el bind mount de arriba no la oculte.
      # No hace falta live-reload aqui: la libreria no cambia mientras desarrollas tu propio
      # codigo. Si alguna vez actualizas la version de Alpine en package.json, reconstruye
      # con `docker compose build web` (y de una vez `docker compose down` para que el volumen
      # se vuelva a poblar, o `docker volume rm triviamillon_alpine_vendor`).
      - alpine_vendor:/app/static/vendor
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  tailwind:
    build: .
    # static/dist SI vive en el bind mount normal (sin volumen nombrado): este contenedor
    # recompila el CSS cada vez que cambia una clase en templates/apps y el resultado se ve
    # de inmediato en el navegador (solo hace falta recargar la pagina), sin tocar Docker.
    command: tailwindcss -i tailwind/input.css -o static/dist/output.css --watch=always
    volumes:
      - .:/app

volumes:
  postgres_data:
  alpine_vendor:
