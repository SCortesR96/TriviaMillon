services:
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file: .env
    volumes:
      - .:/app
      # Tailwind/Alpine se compilan en la imagen (Dockerfile); estos volumenes nombrados
      # se montan sobre esas subcarpetas para que el bind mount de arriba no las oculte.
      # OJO: solo se llenan la primera vez que se crean. Si cambias templates/CSS y no ves
      # el cambio, corre `docker compose down` + `docker volume rm triviamillon_tailwind_dist
      # triviamillon_alpine_vendor` antes de reconstruir.
      - tailwind_dist:/app/static/dist
      - alpine_vendor:/app/static/vendor
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  tailwind_dist:
  alpine_vendor:
